name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run build

      - uses: actions/upload-artifact@v7
        with:
          name: chrome-extension
          path: artifacts/josm-strava-heatmap-chrome.zip

      - uses: actions/upload-artifact@v7
        with:
          name: firefox-extension
          path: artifacts/josm-strava-heatmap-firefox.zip
