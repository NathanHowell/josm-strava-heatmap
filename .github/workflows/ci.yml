name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: chrome-extension
          path: artifacts/josm-strava-heatmap-chrome.zip

      - uses: actions/upload-artifact@v4
        with:
          name: firefox-extension
          path: artifacts/josm-strava-heatmap-firefox.zip
